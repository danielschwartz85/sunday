<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunday</title>
    <base href="/sunday/">
    <script>
        (function() {
            var isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.protocol === 'file:';
            if (isLocal) {
                var base = document.querySelector('base');
                if (base) base.setAttribute('href', '');
            }
        })();
    </script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='32' fill='%231a1a1a'/%3E%3Cpath d='M16 44 L24 16' stroke='%23ff4d4d' stroke-width='7' stroke-linecap='round'/%3E%3Cpath d='M26 44 L34 16' stroke='%23ffb830' stroke-width='7' stroke-linecap='round'/%3E%3Cpath d='M36 44 L44 16' stroke='%2300c2cb' stroke-width='7' stroke-linecap='round'/%3E%3C/svg%3E">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="vendor/playpen-sans/playpen-sans.css">
    <link href="vendor/quill/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="vendor/highlightjs/base16-dracula.min.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-wrapper">
        <div class="hero-banner">
            <img src="banners/dark-sunday.png" alt="Task Manager Logo" class="hero-logo">
        </div>

        <div class="container">
            <div class="task-column" id="on-it">
                <h2>🚀 On It</h2>
                <button class="add-task-btn" title="Add Task (Ctrl + Alt + N)">Add Task</button>
                <div class="task-list"></div>
            </div>
            <div class="task-column" id="next-up">
                <h2>🕗 Next Up</h2>
                <button class="add-task-btn">Add Task</button>
                <div class="task-list"></div>
            </div>
            <div class="task-column" id="back-log">
                <h2>📋 Back Log</h2>
                <button class="add-task-btn">Add Task</button>
                <div class="task-list"></div>
            </div>
        </div>

        <div class="bottom-actions">
            <button id="show-deleted-tasks" class="show-deleted-btn">Show Completed</button>
            <button id="sync-btn" class="sync-btn" title="Sync with Airtable">⇅</button>
        </div>

        <div class="task-panel" id="task-panel">
            <div class="panel-content">
                <button class="close-panel">&times;</button>
                <h3>Task Details<span style="font-size: 0.8em; font-weight: normal; opacity: 0.8; margin-left: 8px">(Press Ctrl + Alt + N for new subtask)</span></h3>
                <input type="text" id="task-name" placeholder="Task Name">
                <div id="task-description-editor"></div>
                <input type="url" id="task-url" placeholder="URL (optional)">
                <div class="panel-tags-section">
                    <div class="panel-tags-list" id="panel-tags-list"></div>
                    <button class="panel-tag-button" id="panel-tag-button" type="button" title="Add tag (Ctrl + Alt + T)">#</button>
                </div>
                <div class="subtasks">
                    <h4>Subtasks</h4>
                    <div class="subtask-list"></div>
                    <button class="add-subtask-btn">Add Subtask</button>
                </div>
                <div class="button-container">
                    <button class="save-task">Save (Ctrl + Alt + S)</button>
                    <button class="close-task-btn">Close</button>
                </div>
            </div>
        </div>

        <div class="task-panel" id="subtask-panel">
            <div class="panel-content">
                <button class="close-panel">&times;</button>
                <h3>New Subtask</h3>
                <input type="text" id="subtask-name" placeholder="Subtask Name">
                <div id="subtask-description-editor"></div>
                <input type="url" id="subtask-url" placeholder="URL (optional)">
                <div class="button-container">
                    <button class="save-subtask">Save Subtask (Ctrl + Alt + S)</button>
                    <button class="close-subtask-btn">Close</button>
                </div>
            </div>
        </div>

        <div class="deleted-tasks-panel" id="deleted-tasks-panel">
            <div class="panel-content">
                <button class="close-panel">&times;</button>
                <h3>Completed Tasks</h3>
                <div class="deleted-task-list"></div>
                <div class="panel-footer">
                    <button class="clear-all-btn">Clear All</button>
                    <button class="close-completed-btn">Close</button>
                </div>
            </div>
        </div>
        <span class="bottom-bar">Daniel Schwartz Inc 🚀 Copyright © 2026, All Rights Are All Right!</span>
    </div>

    <div id="loading-overlay">
        <div class="loading-box">
            <div class="loading-spinner"></div>
            <div class="loading-error-icon">!</div>
            <span id="loading-label">Loading...</span>
            <button id="loading-dismiss-btn">Dismiss</button>
        </div>
    </div>

    <script src="vendor/highlightjs/highlight.min.js"></script>
    <script src="vendor/quill/quill.js"></script>
    <script src="vendor/airtable/airtable.js"></script>
    <script>window.Airtable = require('airtable');</script>
    <script src="models/task.js"></script>
    <script src="models/taskList.js"></script>
    <script src="app.js"></script>
        <script>
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', function() {
                    navigator.serviceWorker.register('service-worker.js');
                });
            }
        </script>
</body>
</html>
